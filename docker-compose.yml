version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-purvii}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-purvii} -d $${POSTGRES_DB:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-purvii}:${POSTGRES_PASSWORD:-password123}@db:5432/${POSTGRES_DB:-taskflow}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-keep-it-secret}
    command: sh -c "/app/.venv/bin/alembic upgrade head && /app/.venv/bin/python -m app.db.seed && /app/.venv/bin/fastapi run app/main.py --port 8000 --host 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
